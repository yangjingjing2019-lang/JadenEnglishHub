<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaden 加油站 - English Hub</title>
    <style>
        :root {
            --primary-color: #4a90e2; 
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-color: #34495e;
            --shadow: 8px 8px 18px #d1d9e6, -8px -8px 18px #ffffff;
            --inner-shadow: inset 4px 4px 8px #d1d9e6, inset -4px -4px 8px #ffffff;
            --font-main: "Yuanti SC", "STYuanti-SC-Regular", "微軟正黑體", sans-serif;
            --accent-new: #ff4757;
            --accent-ready: #27ae60;
            --tense-color: #9b59b6; /* 翻卡紫色 */
            --quiz-color: #e67e22;  /* 練習橙色 */
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            font-family: var(--font-main);
            color: #444; min-height: 100vh;
        }

        .fixed-header-title {
            position: fixed; top: 15px; right: 20px;
            font-size: 14px; color: var(--primary-color);
            z-index: 1000; font-weight: bold;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px 12px; border-radius: 20px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
        }

        .container { max-width: 900px; margin: 0 auto; padding: 70px 25px 50px; }

        .welcome-section { text-align: center; margin-bottom: 50px; }
        .welcome-section h1 {
            color: var(--primary-color); font-size: 38px;
            margin-bottom: 12px; letter-spacing: 2px;
        }
        .welcome-section p { color: #7f8c8d; font-size: 18px; margin: 0; font-weight: 500; }

        .section-title {
            font-size: 22px; color: var(--text-color);
            margin: 45px 0 20px; display: flex;
            align-items: center; gap: 12px; font-weight: bold;
        }

        .section-title::before {
            content: ""; display: inline-block;
            width: 8px; height: 24px;
            border-radius: 10px;
        }

        /* 欄目標籤顏色 */
        .term-4a::before { background: #3498db; }
        .term-4b::before { background: #2ecc71; }
        .tense-section::before { background: var(--tense-color); }
        .quiz-section::before { background: var(--quiz-color); }

        .game-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px;
        }

        .game-card {
            background: var(--card-bg); border-radius: 35px;
            padding: 25px 15px; text-align: center;
            text-decoration: none; color: inherit;
            box-shadow: var(--shadow); border: 2.5px solid white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column; align-items: center;
        }

        .game-card:hover { transform: translateY(-5px); }
        .game-card:active { transform: scale(0.95); box-shadow: var(--inner-shadow); }

        .game-icon { font-size: 48px; margin-bottom: 12px; }
        .game-name { font-weight: bold; font-size: 15px; color: #2c3e50; margin-bottom: 10px; line-height: 1.3; height: 40px; display: flex; align-items: center; }

        .game-status {
            font-size: 10px; padding: 4px 10px; border-radius: 10px;
            background: #ecf0f1; color: #95a5a6; font-weight: bold;
        }

        .status-new { background: var(--accent-new) !important; color: white !important; }
        .status-online { background: #e3f2fd !important; color: #1976d2 !important; }
        .status-tense { background: #f3e5f5 !important; color: #8e24aa !important; }
        .status-quiz { background: #fff3e0 !important; color: #ef6c00 !important; }

        .game-card.locked { opacity: 0.6; cursor: default; filter: grayscale(0.8); }

        @media (max-width: 768px) {
            .game-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
        }

        .copyright {
            margin-top: 80px; font-size: 13px; color: #95a5a6;
            text-align: center; line-height: 1.8; padding-bottom: 40px;
        }
    </style>
</head>
<body>

<div class="fixed-header-title">Jaden 加油站</div>

<div class="container">
    <div class="welcome-section">
        <h1>🚀 Jaden 加油站</h1>
        <p>Keep Growing, Keep Learning!</p>
    </div>

    <div class="section-title term-4a">Primary 4A - Vocabulary & Spelling</div>
    <div class="game-grid" id="grid-4a"></div>

    <div class="section-title tense-section">P4A Verb Tense - Flashcards</div>
    <div class="game-grid" id="grid-tense-flash"></div>

    <div class="section-title quiz-section">P4A Verb Tense - Quiz Challenge</div>
    <div class="game-grid" id="grid-tense-quiz"></div>

    <div class="section-title term-4b">Primary 4B - Vocabulary & Spelling</div>
    <div class="game-grid" id="grid-4b"></div>

    <div class="copyright">
        Designed for Jaden's English Learning Journey<br>
        © 2024 Jaden 加油站 版權所有
    </div>
</div>

<script>
    // 1. 4A 詞語數據
    const term4AData = [
        { name: "Unit 1: Leisure activities", url: "https://yangjingjing2019-lang.github.io/Jaden4Aflashcardunit1/", icon: "🎡", status: "NEW" },
        { name: "Unit 2: Friendly actions", url: "https://yangjingjing2019-lang.github.io/Jaden4Aflashcardunit2/", icon: "🏫", status: "NEW" },
        { name: "Unit 3: Describing people", url: "https://yangjingjing2019-lang.github.io/Jaden4Aflashcardunit3/", icon: "🍎", status: "NEW" },
        { name: "Unit 4: Types of stories", url: "https://yangjingjing2019-lang.github.io/Jaden4Aflashcardunit4/", icon: "🎮", status: "NEW" },
        { name: "Unit 5: Festival activities", url: "https://yangjingjing2019-lang.github.io/Jaden-4a-flashcard/", icon: "🃏", status: "NEW" },
        { name: "Unit 6: Funfair things", url: "https://yangjingjing2019-lang.github.io/Jaden4Aflashcardunit6/", icon: "🎡", status: "NEW" }
    ];

    // 2. Tense 翻卡數據
    const tenseFlashData = [
        { name: "Verb Card: Page 1 (1-33)", url: "https://yangjingjing2019-lang.github.io/Jaden-4A-tense-flashcard1/", icon: "💎", status: "TENSE" },
        { name: "Verb Card: Page 2 (34-77)", url: "https://yangjingjing2019-lang.github.io/Jaden-4A-tense-flashcard2/", icon: "💎", status: "TENSE" },
        { name: "Verb Card: Page 3 (78-118)", url: "https://yangjingjing2019-lang.github.io/Jaden-4A-tense-flashcard3/", icon: "💎", status: "TENSE" }
    ];

    // 3. Tense 練習數據 (修改了圖標為更具挑戰性的火箭、靶心等)
    const tenseQuizData = [
        { name: "Tense Quiz: Level 1", url: "https://yangjingjing2019-lang.github.io/Jaden-4A-tense-exercise1/", icon: "🚀", status: "QUIZ" },
        { name: "Tense Quiz: Level 2", url: "https://yangjingjing2019-lang.github.io/Jaden-4A-tense-exercise2/", icon: "🎯", status: "QUIZ" },
        { name: "Tense Quiz: Level 3", url: "https://yangjingjing2019-lang.github.io/Jaden-4A-tense-exercise3/", icon: "🔥", status: "QUIZ" }
    ];

    // 4. 4B 數據
    const term4BData = [
        { name: "Unit 1: Nature", url: "#", icon: "🌿", status: "敬請期待" },
        { name: "Unit 2: Shopping", url: "#", icon: "🛍️", status: "敬請期待" },
        { name: "Unit 3: Food Art", url: "#", icon: "👨‍🍳", status: "敬請期待" },
        { name: "Unit 4: Travel Plan", url: "#", icon: "✈️", status: "敬請期待" },
        { name: "Unit 5: Weather", url: "#", icon: "☁️", status: "敬請期待" },
        { name: "Unit 6: Graduation", url: "#", icon: "🎓", status: "敬請期待" }
    ];

    window.onload = () => {
        renderGrid('grid-4a', term4AData);
        renderGrid('grid-tense-flash', tenseFlashData);
        renderGrid('grid-tense-quiz', tenseQuizData);
        renderGrid('grid-4b', term4BData);
    };

    function renderGrid(containerId, data) {
        const container = document.getElementById(containerId);
        container.innerHTML = data.map(item => {
            const isLocked = item.status === '敬請期待';
            const isNew = item.status === 'NEW';
            
            let statusClass = '';
            if (isNew) statusClass = 'status-new';
            else if (item.status === 'TENSE') statusClass = 'status-tense';
            else if (item.status === 'QUIZ') statusClass = 'status-quiz';
            else if (!isLocked) statusClass = 'status-online';

            return `
                <a href="${item.url !== '#' ? item.url : 'javascript:void(0)'}" 
                   class="game-card ${isLocked ? 'locked' : ''}"
                   ${item.url !== '#' ? `target="_blank"` : 'onclick="alert(\'網頁準備中，請稍後再試！\')"'}>
                    <div class="game-icon">${item.icon}</div>
                    <div class="game-name">${item.name}</div>
                    <div class="game-status ${statusClass}">${item.status}</div>
                </a>
            `;
        }).join('');
    }
</script>

</body>
</html>
